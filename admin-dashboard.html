<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Admin Dashboard</title>
        <link rel="stylesheet" href="style-admin-dashboard.css">
    </head>
    <body>
        <div class="sidebar">
            <div class="title-logo">
                <img src="title-icon/view-dashboard.svg" alt="icon" class="icon">
                <h1>Dashboard</h1>
            </div>
            <div class ="home">
                <img src ="icons/home.svg" alt="icon" class="icon">
                <button>Home</button>
                
            </div>
            <div class = "profile">
                <img src ="icons/card-account-details.svg" alt="icon" class="icon">
                <button>Profile</button>
            </div>
            <div class="messages">
                <img src ="icons/message.svg" alt="icon" class="icon">
                <button>Mesage</button>                
            </div>
            <div class="history">
                <img src ="icons/history.svg" alt="icon" class="icon">
                <button>History</button>                
            </div>
            <div class="task">
                <img src ="icons/file-document-multiple.svg" alt="icon" class="icon">
                <button>Task</button>                
            </div>     
            <div class="commuities">
                <img src ="icons/account-group.svg" alt="icon" class="icon">
                <button>Communities</button>                
            </div>
            <div class="settings">
                <img src ="icons/cog.svg" alt="icon" class="icon">
                <button>Settings</button>                
            </div>
            <div class="support">
                <img src ="icons/help-box-outline.svg" alt="icon" class="icon">
                <button>Support</button>                
            </div>
            <div class="privacy">
                <img src ="icons/shield-check.svg" alt="icon" class="icon">
                <button>Privacy</button>                
            </div>                    
        </div>
    </body>
</html>
